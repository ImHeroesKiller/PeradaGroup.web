name: Update Hero Content with Gemini

on:
  schedule:
    # 07:00 WIB = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hero-content
  cancel-in-progress: false

jobs:
  update-hero:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.js 24 — versi LTS terbaru; didukung native oleh setup-node@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate hero content with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-hero-content.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/id/hero-content.json data/en/hero-content.json data/zh/hero-content.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-update hero content via Gemini [skip ci]"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "::error title=Hero Content Update Failed::Lihat detail di ${RUN_URL}"
          echo ""
          echo "============================================================"
          echo "  WORKFLOW FAILURE NOTIFICATION"
          echo "============================================================"
          echo ""
          echo "  Workflow : ${{ github.workflow }}"
          echo "  Status   : Failed"
          echo "  Run URL  : ${RUN_URL}"
          echo ""
          echo "  Saran troubleshooting:"
          echo "  - Pastikan secret GEMINI_API_KEY sudah dikonfigurasi dan valid"
          echo "  - Cek log langkah \"Generate hero content with Gemini\" untuk error API"
          echo "  - Verifikasi kuota atau rate limit Gemini API"
          echo "  - Pastikan npm ci berjalan normal di folder scripts/"
          echo ""
          echo "============================================================"